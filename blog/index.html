---
layout: default
title: Blog
---
<p class="post-list-heading">Vse objave</p>
<ul class="post-list">
  {% for post in site.posts %}
  <li>
    <span class="post-meta">{{ post.date | date: "%Y-%m-%d" }}</span>
    <a class="post-link" href="{{ post.url }}">{{ post.title }}</a>
    {% if post.author %}
    <span class="post-category">{{ post.author }}</span>
    {% endif %}
  </li>
  {% endfor %}
</ul>

---
layout: default
---
<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%d. %B %Y" }}
      {% if page.author %} &middot; {{ page.author }}{% endif %}
      {% if page.categories %} &middot; {% for cat in page.categories %}<span>{{ cat }}</span>{% unless forloop.last %}, {% endunless %}{% endfor %}{% endif %}
    </p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <nav class="post-nav">
    <a href="/">&larr; Vse objave</a>
  </nav>
</article>

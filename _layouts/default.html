<!DOCTYPE html>
<html lang="{{ site.lang | default: 'sl' }}" class="new-site">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}Wisk | Yu-Gi-Oh!</title>
    {% seo %}
    <link rel="icon" href="/assets/images/favicon.ico">
    <link rel="stylesheet" href="/assets/css/main.css">
  </head>
  <body class="new-site">
    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
    <header class="site-header">
      <a class="site-title" href="/">{{ site.title }}</a>
      <nav>
        {% for item in site.data.navigation %}
        <a href="{{ item.url }}">{{ item.title }}</a>
        {% endfor %}
      </nav>
      <label for="nav-toggle" class="hamburger-btn" aria-label="Meni">
        <span></span>
        <span></span>
        <span></span>
      </label>
    </header>

    <nav class="mobile-nav">
      {% for item in site.data.navigation %}
      <a href="{{ item.url }}">{{ item.title }}</a>
      {% endfor %}
    </nav>

    <main class="site-main">
      <div class="site-main-inner">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <a href="https://www.youtube.com/channel/UCAKUK9MYS4TfznStFvWmiIQ" target="_blank" rel="noopener">YouTube</a>
    </footer>

    {% if site.google_analytics %}
    {% include analytics.html %}
    {% endif %}
  </body>
</html>

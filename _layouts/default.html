<!DOCTYPE html>
<html lang="{{ site.lang | default: 'sl' }}" class="new-site">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    {% seo %}
    <link rel="stylesheet" href="/assets/css/main.css">
  </head>
  <body class="new-site">
    <header class="site-header">
      <a class="site-title" href="/">{{ site.title }}</a>
      <nav>
        {% for item in site.data.navigation %}
        <a href="{{ item.url }}">{{ item.title }}</a>
        {% endfor %}
      </nav>
    </header>

    <main class="site-main">
      <div class="site-main-inner">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <a href="mailto:slogoatsss@gmail.com">&#9993; slogoatsss@gmail.com</a>
      <a href="https://www.facebook.com/slogoatsss/" target="_blank" rel="noopener">Facebook</a>
      <a href="https://www.youtube.com/channel/UCAKUK9MYS4TfznStFvWmiIQ" target="_blank" rel="noopener">YouTube</a>
    </footer>

    {% if site.google_analytics %}
    {% include analytics.html %}
    {% endif %}
  </body>
</html>

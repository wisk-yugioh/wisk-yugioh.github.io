<!DOCTYPE html>
<html lang="{{ site.lang | default: 'sl' }}" class="new-site">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}Wisk | Yu-Gi-Oh!</title>
    {% seo %}
    <link rel="icon" href="/assets/images/favicon.ico">
    <!-- Preconnect to Google Fonts for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Inter — modern, highly legible sans-serif used across major tech products -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">
  </head>
  <body class="new-site">
    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
    <header class="site-header">
      <a class="site-title" href="/">{{ site.title }}</a>
      <nav>
        {% include nav-links.html %}
      </nav>
      <label for="nav-toggle" class="hamburger-btn" aria-label="{% if page.lang == 'en' %}Menu{% else %}Meni{% endif %}">
        <span></span>
        <span></span>
        <span></span>
      </label>
    </header>

    <nav class="mobile-nav">
      {% include nav-links.html %}
    </nav>

    <main class="site-main{% if page.home %} site-main--home{% endif %}">
      <div class="site-main-inner">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      {% for link in site.data.social %}
      <a href="{{ link.url }}" target="_blank" rel="noopener">{{ link.title }}</a>
      {% endfor %}
    </footer>

    {% if site.google_analytics %}
    {% include analytics.html %}
    {% endif %}
  </body>
</html>

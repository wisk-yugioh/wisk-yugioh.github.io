---
layout: default
title: Blog (ENG)
---
<p class="post-list-heading">Articles (English)</p>
<ul class="post-list">
  {% assign eng_sorted = site.blog_en | sort: 'date' | reverse %}
  {% for post in eng_sorted %}
  <li>
    <span class="post-meta">{{ post.date | date: "%Y-%m-%d" }}</span>
    <a class="post-link" href="{{ post.url }}">{{ post.title }}</a>
    {% if post.author %}
    <span class="post-category">{{ post.author }}</span>
    {% endif %}
  </li>
  {% endfor %}
</ul>

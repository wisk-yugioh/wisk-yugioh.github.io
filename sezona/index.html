---
layout: default
title: SloGoatsss 2018/19 Sezona
---
<p class="post-list-heading">SloGoatsss 2018/19 Sezona</p>
<ul class="post-list">
  {% assign sezona_sorted = site.sezona | sort: 'date' | reverse %}
  {% for post in sezona_sorted %}
  <li>
    <span class="post-meta">{{ post.date | date: "%Y-%m-%d" }}</span>
    <a class="post-link" href="{{ post.url }}">{{ post.title }}</a>
  </li>
  {% endfor %}
</ul>

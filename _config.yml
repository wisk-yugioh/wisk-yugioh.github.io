title: SloGoatsss
description: Slovenska Yu-Gi-Oh! Goat Format skupnost
url: "https://wisk-yugioh.github.io"
baseurl: ""
lang: sl

author: SloGoatsss

markdown: kramdown
permalink: /blog/:year/:month/:day/:title
future: true

collections:
  historic:
    output: true
    permalink: /historic/:year/:month/:day/:title
  sezona:
    output: true
    permalink: /sezona/:year/:month/:day/:title

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - not_published
  - Gemfile
  - Gemfile.lock
  - README.md
  - PLAN.md
  - CHANGELOG.md
  - TODOS.md
  - COPILOT.md
